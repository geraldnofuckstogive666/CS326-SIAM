<!DOCTYPE html>
<html>

<head>
    <title>TaskLite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-lg text-center w-96">
        <h1 class="text-3xl font-bold text-gray-800">TaskLite</h1>
        <p class="text-gray-500 mt-2">Simple Productivity System</p>

        <input id="username" class="mt-6 w-full p-3 border rounded-lg" placeholder="Enter username" />

        <button onclick="enterDashboard()" class="mt-4 w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600">
            Enter Dashboard
        </button>
    </div>

    <script>
        function enterDashboard() {
            const user = document.getElementById("username").value;
            if (!user) return alert("Enter username");

            localStorage.setItem("user", user);
            window.location.href = "dashboard.html";
        }
    </script>

</body>

</html>
